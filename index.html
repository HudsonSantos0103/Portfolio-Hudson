<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hudson Santos | Portfólio</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <style>
        /* Reset básico e tipografia */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif; /* Aplica a fonte Poppins */
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #0f0f1b; /* Fundo escuro profundo */
            overflow: hidden; /* Esconde qualquer elemento que saia da tela */
            position: relative; /* Necessário para posicionar os elementos pseudo */
        }

        /* Animação do fundo com elementos brilhantes */
        body::before, body::after {
            content: '';
            position: absolute;
            width: 450px; /* Tamanho maior para as formas */
            height: 450px;
            border-radius: 50%;
            filter: blur(120px); /* Mais desfoque */
            animation: float 12s infinite alternate ease-in-out; /* Animação mais longa e suave */
            z-index: 0; /* Garante que fique atrás do cartão */
        }

        body::before {
            background: rgba(0, 255, 170, 0.45); /* Verde Neon um pouco mais intenso */
            top: -120px; /* Posições ajustadas */
            left: -120px;
        }

        body::after {
            background: rgba(0, 153, 255, 0.45); /* Azul Cyber um pouco mais intenso */
            bottom: -120px;
            right: -120px;
            animation-delay: -6s; /* Inicia a animação da segunda forma em um ponto diferente */
        }

        @keyframes float {
            0% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(150px, 100px) rotate(180deg); } /* Move e rotaciona */
            100% { transform: translate(-50px, -120px) rotate(360deg); }
        }

        /* Estilo do cartão principal (Glassmorphism) */
        .glass-card {
            background: rgba(255, 255, 255, 0.08); /* Fundo um pouco mais opaco */
            backdrop-filter: blur(20px); /* Mais desfoque para o efeito vidro */
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15); /* Borda um pouco mais visível */
            border-radius: 28px; /* Cantos mais arredondados */
            padding: 40px;
            width: 100%;
            max-width: 420px; /* Ligeiramente mais largo */
            text-align: center;
            color: #fff;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6); /* Sombra mais pronunciada */
            z-index: 1; /* Garante que fique acima do fundo */
            transition: all 0.3s ease; /* Transição suave para o hover */
            transform-style: preserve-3d; /* Essencial para o efeito 3D do Vanilla Tilt */
        }

        .glass-card:hover {
            transform: translateY(-8px); /* Levanta um pouco mais no hover */
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.7);
        }

        /* Foto de Perfil */
        .profile-pic {
            width: 140px; /* Um pouco maior */
            height: 140px;
            border-radius: 50%;
            background: linear-gradient(45deg, #00ffaa, #0099ff); /* Gradiente vibrante */
            margin: 0 auto 25px; /* Mais espaço abaixo */
            padding: 5px; /* Borda gradiente mais grossa */
            box-shadow: 0 0 25px rgba(0, 255, 170, 0.4); /* Brilho mais intenso */
            display: flex; /* Para centralizar a imagem interna */
            justify-content: center;
            align-items: center;
        }

        .profile-pic img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            background: #1a1a2e; /* Cor de fundo para a imagem */
            border: 3px solid #0f0f1b; /* Borda interna para separar do gradiente */
        }

        h1 {
            font-size: 1.8rem; /* Título maior */
            font-weight: 700;
            letter-spacing: 1.5px; /* Mais espaçamento entre letras */
            margin-bottom: 8px;
            text-shadow: 0 0 10px rgba(0, 255, 170, 0.2); /* Sombra de texto sutil */
        }

        p {
            font-size: 1rem; /* Descrição um pouco maior */
            color: #c0c0d0; /* Cor mais clara para o texto */
            margin-bottom: 35px;
            font-weight: 300;
        }

        /* Botões Avançados */
        .btn {
            display: flex; /* Usar flexbox para alinhar ícone e texto */
            justify-content: center;
            align-items: center;
            gap: 10px; /* Espaçamento entre ícone e texto */
            width: 100%;
            padding: 16px; /* Mais padding */
            margin-bottom: 18px; /* Mais espaço entre botões */
            text-decoration: none;
            color: #e0e0e0; /* Cor do texto do botão */
            background: rgba(255, 255, 255, 0.07); /* Fundo do botão um pouco mais visível */
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 14px; /* Cantos mais arredondados */
            font-weight: 500;
            font-size: 1.1rem; /* Texto do botão maior */
            letter-spacing: 1.2px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden; /* Esconde o pseudo-elemento ::before */
        }

        .btn i {
            font-size: 1.3em; /* Tamanho do ícone relativo ao texto */
        }

        /* Efeito de Hover Brilhante nos botões */
        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent); /* Brilho mais forte */
            transition: left 0.6s ease; /* Transição mais lenta para o brilho */
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(0, 255, 170, 0.7); /* Borda mais visível ao hover */
            box-shadow: 0 0 20px rgba(0, 255, 170, 0.35); /* Sombra mais intensa */
            transform: scale(1.03); /* Leve zoom no botão */
            color: #00ffaa; /* Cor do texto muda para verde neon */
        }

        .btn:hover::before {
            left: 100%;
        }

        /* Ajustes para a última margem do botão */
        .btn:last-child {
            margin-bottom: 0;
        }
    </style>
</head>
<body>

    <div class="glass-card">
        <div class="profile-pic">
            <img src="https://avatars.githubusercontent.com/u/185989991?s=400&u=36785c12b7c260aff23371fd5edf636e84279090&v=4" alt="Hudson Santos">
        </div>
        <h1>Hudson Santos</h1>
        <p>Back-End Developer | Python</p>

        <a href="https://github.com/HudsonSantos0103" target="_blank" class="btn">
            <i class="fab fa-github"></i> GitHub
        </a>
        <a href="https://www.linkedin.com/in/SeuUsuarioLinkedIn/" target="_blank" class="btn">
            <i class="fab fa-linkedin"></i> LinkedIn
        </a>
        <a href="https://www.instagram.com/SeuUsuarioInstagram/" target="_blank" class="btn">
            <i class="fab fa-instagram"></i> Instagram
        </a>
        <a href="https://seulinkdoportfolio.com" target="_blank" class="btn">
            <i class="fas fa-globe"></i> Meu Portfólio Web
        </a>
    </div>

    <script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.1/vanilla-tilt.min.js"></script>
    
    <script>
        VanillaTilt.init(document.querySelector(".glass-card"), {
            max: 18,          // Ângulo máximo de inclinação um pouco maior
            speed: 500,       // Velocidade da transição
            glare: true,      // Ativa o efeito de "brilho"
            "max-glare": 0.3, // Intensidade do brilho um pouco maior
            scale: 1.05       // Leve zoom no cartão
        });
    </script>

</body>
</html>
